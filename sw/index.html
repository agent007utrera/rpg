<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --sw-blue: #00e5ff;
            --sw-bg: #0a0a0a;
            --sw-panel: rgba(20, 20, 20, 0.9);
            --sw-text: #e0e0e0;
            --glow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            color: var(--sw-text);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Título de la Terminal */
        .terminal-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .terminal-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            color: var(--sw-blue);
            text-shadow: var(--glow);
            text-transform: uppercase;
        }

        .terminal-header p {
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Grid de Jugadores */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            z-index: 5;
        }

        /* Tarjeta de Personaje */
        .char-card {
            background: var(--sw-panel);
            border: 2px solid #333;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
        }

        .char-card:hover {
            border-color: var(--sw-blue);
            box-shadow: var(--glow);
            transform: translateY(-5px);
            background: rgba(0, 229, 255, 0.05);
        }

        .img-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--sw-blue);
            overflow: hidden;
            margin-bottom: 15px;
            background: #000;
            box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.5) contrast(1.2);
            transition: 0.3s;
        }

        .char-card:hover .img-container img {
            filter: grayscale(0) contrast(1);
            transform: scale(1.1);
        }

        .char-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .char-status {
            font-size: 0.8rem;
            color: var(--sw-blue);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Efecto de Scanlines General */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .footer-deco {
            margin-top: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <h1>Tripulación de: "El Colmillo de Krayt</h1>
        <p>Seleccione un perfil para acceder a los datos</p>
    </div>

    <div class="selection-grid">
        
        <a href="pash.html" class="char-card">
            <div class="img-container">
                <img src="images/pash.jpg" alt="Pash">
            </div>
            <div class="char-name">Pash</div>
            <div class="char-status">CONTRABANDISTA - HUMANO</div>
        </a>

        <a href="low.html" class="char-card">
            <div class="img-container">
                <img src="images/low.jpg" alt="Lowhhrick">
            </div>
            <div class="char-name">Lowhhrick</div>
            <div class="char-status">PISTOLERO A SUELDO - WOOKIE</div>
        </a>

        <a href="oskara.html" class="char-card">
            <div class="img-container">
                <img src="images/oskara.jpg" alt="Oskara">
            </div>
            <div class="char-name">Oskara</div>
            <div class="char-status">CAZARRECOMPENSAS - TWI'LEK</div>
        </a>

        <a href="vex.html" class="char-card">
            <div class="img-container">
                <img src="images/vex.jpg" alt="41-Vex">
            </div>
            <div class="char-name">41-Vex</div>
            <div class="char-status">MÉDICO - DROIDE</div>
        </a>

        <a href="mathus.html" class="char-card">
            <div class="img-container">
                <img src="images/mathus.jpg" alt="Mathus">
            </div>
            <div class="char-name">Mathus</div>
            <div class="char-status">MECÁNICO - HUMANO</div>
        </a>

    </div>

    <div class="footer-deco">CORE_SYSTEM_ACCESS // ENCRYPTED_LINK_0.4</div>

</body>
</html>
