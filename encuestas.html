<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sectarios de Cthulhu - Registro Prohibido</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cinzel+Decorative:wght@400;700&display=swap');

        body {
            background-color: #1a1a1a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d4c3a3;
            font-family: 'Special Elite', 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto; 
        }

        .main-container {
            background-color: #c2b280;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 40px;
            border: 15px double #3d3429;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.2);
            max-width: 550px;
            width: 95%;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.8rem;
            color: #1a1a1a;
            margin: 0 auto 15px auto;
            line-height: 1.1;
            border-bottom: 2px solid #3d3429;
            padding-bottom: 15px;
        }

        .typewriter {
            display: inline-block;
            overflow: hidden;
            border-right: .10em solid #1a1a1a;
            animation: typing 3s steps(40, end), blink-caret .6s step-end infinite;
        }

        @keyframes typing { from { max-height: 0; opacity: 0; } to { max-height: 300px; opacity: 1; } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #1a1a1a } }

        p.subtitle {
            color: #3d3429;
            font-style: italic;
            margin-bottom: 30px;
            font-weight: bold;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li { margin: 12px 0; }

        nav ul li a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 1.3rem;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
            padding: 5px 10px;
            cursor: pointer;
        }

        nav ul li a:hover {
            color: #8b0000;
            transform: scale(1.05);
            background: rgba(0,0,0,0.05);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            overflow-y: auto;
        }

        .modal-content {
            background-color: #c2b280;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            margin: 10% auto;
            padding: 30px;
            width: 80%;
            max-width: 400px;
            border: 8px double #3d3429;
            text-align: center;
            color: #1a1a1a;
            box-shadow: 0 0 30px black;
        }

        .modal-content h3 { font-family: 'Cinzel Decorative', cursive; }

        input[type="password"] {
            background: rgba(0,0,0,0.1);
            border: 1px solid #3d3429;
            padding: 10px;
            font-family: 'Special Elite';
            font-size: 1.2rem;
            text-align: center;
            width: 80%;
            margin: 20px 0;
        }

        .btn-vintage {
            background: #3d3429;
            color: #c2b280;
            border: none;
            padding: 10px 20px;
            font-family: 'Special Elite';
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-vintage:hover { background: #1a1a1a; }

        .seal {
            margin: 25px auto;
            opacity: 0.7;
            border: 3px double #3d3429;
            width: 80px; height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; font-size: 0.7rem; font-weight: bold;
            transform: rotate(-10deg); color: #3d3429;
        }

        #quote-container {
            font-size: 0.8rem;
            color: #4e4438;
            margin-top: 20px;
            min-height: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <audio id="soundCorrecto" src="correcto.mp3" preload="auto"></audio>
    <audio id="soundError" src="error.mp3" preload="auto"></audio>

    <div class="main-container">
        <div class="typewriter">
            <h1>SECTARIOS DE CTHULHU</h1>
        </div>
        
        <p class="subtitle">Expediente Clasificado - Universidad de Miskatonic</p>
        
        <nav>
            <ul>
                <li><a href="enc_modulos.html">MÓDULOS DE ROL</a></li>
                <li><a href="enc_movies.html">PELÍCULAS</a></li>
                <li><a href="enc_juegos.html">VIDEOJUEGOS</a></li>
                <li><a href="enc_aventuras.html">AVENTURAS SUELTAS</a></li>
                <li><a onclick="openSecret()">📜 BIBLIOTECA PROHIBIDA</a></li>
            </ul>
        </nav>

        <div class="seal">
            <div>EST.</div>
            <div style="font-size: 1.1rem;">1926</div>
            <div>ARKHAM</div>
        </div>
        
        <div id="quote-container"></div>
    </div>

    <div id="secretModal" class="modal">
        <div class="modal-content">
            <h3 id="modalStatus">Acceso Restringido</h3>
            <p id="modalMsg">Introduzca la clave del culto para acceder a los manuscritos.</p>
            <div id="inputArea">
                <input type="password" id="passInput" placeholder="****">
                <br>
                <button class="btn-vintage" onclick="checkPass()">DESCIFRAR</button>
            </div>
            <div id="errorArea" style="display:none;">
                <button class="btn-vintage" onclick="closeModal()">CONTINUAR</button>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            '"No está muerto lo que puede yacer eternamente, y con los eones extraños incluso la muerte puede morir."',
            '"La emoción más antigua y más intensa de la humanidad es el miedo, y el más antiguo y más intenso de los miedos es el miedo a lo desconocido."',
            '"Vivimos en una isla de plácida ignorancia, rodeados por los negros mares de lo infinito, y no estamos destinados a emprender largos viajes."',
            '"En su morada de R\'lyeh, el muerto Cthulhu espera soñando."',
            '"Ni los dioses ni los hombres son capaces de comprender la magnitud del horror que acecha en el vacío."',
            '"El mundo es un lugar extraño, pero lo que hay fuera de él es infinitamente más aterrador."'
        ];

        window.onload = function() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('quote-container').innerHTML = `<p>${quotes[randomIndex]}</p>`;
        };

        function openSecret() {
            document.getElementById('modalStatus').innerText = "Acceso Restringido";
            document.getElementById('modalMsg').innerText = "Introduzca la clave del culto para acceder a los manuscritos.";
            document.getElementById('inputArea').style.display = "block";
            document.getElementById('errorArea').style.display = "none";
            document.getElementById('passInput').value = "";
            document.getElementById('secretModal').style.display = "block";
        }

        // Lógica de validación mediante Base64 (basada en generador.html)
        function checkPass() {
            const passInput = document.getElementById('passInput');
            const pass = passInput.value.trim();
            const soundCorrecto = document.getElementById('soundCorrecto');
            const soundError = document.getElementById('soundError');

            if (!pass) return;

            // Codificamos
            const encodedPass = btoa(unescape(encodeURIComponent(pass)));
            const selloArcano = "MTcyNA==";

            if (encodedPass === selloArcano) {
                if (soundCorrecto) soundCorrecto.play();
                setTimeout(() => {
                    window.location.href = "enc_biblioteca.html";
                }, 500);
            } else {
                if (soundError) soundError.play();
                document.getElementById('modalStatus').innerText = "ERROR ARCANO";
                document.getElementById('modalMsg').innerText = "La clave es errónea. Los Antiguos acechan.";
                document.getElementById('inputArea').style.display = "none";
                document.getElementById('errorArea').style.display = "block";
            }
        }

        function closeModal() {
            document.getElementById('secretModal').style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById('secretModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
